name: Publish to pkg.go.dev

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Trigger pkg.go.dev index
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-publish-go-1.25-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-publish-go-1.25-

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests before publish
        run: go test ./deathbycaptcha/... -timeout 120s

      - name: Trigger pkg.go.dev index
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          MODULE="github.com/deathbycaptcha/deathbycaptcha-api-client-go"
          echo "Requesting pkg.go.dev to index ${MODULE}@${VERSION}"
          curl -sSf "https://sum.golang.org/lookup/${MODULE}@${VERSION}" || true
          curl -sSf "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" || true
          echo "pkg.go.dev index request sent for ${MODULE}@${VERSION}" | tee -a "$GITHUB_STEP_SUMMARY"
