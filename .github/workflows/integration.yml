name: API Integration

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  api_integration:
    name: API basic integration
    runs-on: ubuntu-latest
    env:
      DBC_USERNAME: ${{ secrets.DBC_USERNAME }}
      DBC_PASSWORD: ${{ secrets.DBC_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-integration-go-1.25-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-integration-go-1.25-

      - name: Show versions
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Skip integration test when secrets are missing
        if: ${{ env.DBC_USERNAME == '' || env.DBC_PASSWORD == '' }}
        run: |
          echo "DBC_USERNAME and/or DBC_PASSWORD secrets are not configured. Skipping API integration test." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Run API integration test
        if: ${{ env.DBC_USERNAME != '' && env.DBC_PASSWORD != '' }}
        run: go test -tags=integration ./tests/integration/... -v -timeout 300s
