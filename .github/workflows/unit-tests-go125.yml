name: Unit Tests (Go 1.25)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit_tests_go125:
    name: Unit tests Go 1.25
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.25-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.25-

      - name: Show versions
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./deathbycaptcha/... -timeout 120s -v
